<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!--
    Full-bleed macOS app / notification icon. Unlike logo.svg, the gradient
    extends edge-to-edge with no rounded clip: macOS (Tahoe+) masks app icons to
    its own rounded-rect shape, and a pre-rounded icon leaves the system's gray
    backing plate showing through the transparent corners. Keep this square and
    opaque; the OS supplies the rounding.
  -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#84fab0" />
      <stop offset="100%" stop-color="#8fd3f4" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <g transform="translate(256, 256) scale(28.571428571428573) translate(-7, -7)">
    <path fill="none" stroke="#00062f" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="m12.72 7.369l-1.41-3.076a1.12 1.12 0 0 0-1.068-.65v0A1.116 1.116 0 0 0 9.18 4.706l-.098 2.11l-4.84-1.445a1.3 1.3 0 0 0-1.616.87v0A1.3 1.3 0 0 0 3.5 7.862l2.866.852c-.677 2.247.925 3.853 3.06 4.31a4.26 4.26 0 0 0 2.197-.076M5.593 1.634L5.529.926m2.648 1.082l-.467.535m-4.521.062l.624.34" />
  </g>
</svg>
