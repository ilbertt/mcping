<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mcping settings</title>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">mcping</h1>
        <p class="app__subtitle">Let MCP servers ping you.</p>
      </header>

      <section class="card">
        <div class="card__row">
          <h2 class="card__title">MCP servers</h2>
          <button id="add-server" type="button" class="button">Add server</button>
        </div>
        <div id="servers" class="servers"></div>
      </section>

      <section class="card">
        <h2 class="card__title">Launch</h2>
        <label class="field field--switch">
          <input type="checkbox" data-setting="launchAtLogin" />
          <span class="field__label">Launch at login</span>
        </label>
      </section>

      <section class="card">
        <details class="log-panel">
          <summary class="log-panel__summary">
            <span class="card__title log-panel__title">Logs</span>
            <button id="copy-log" type="button" class="button button--ghost log-panel__copy">
              Copy
            </button>
          </summary>
          <ol id="log" class="log"></ol>
        </details>
      </section>
    </main>

    <template id="server-template">
      <details class="server" data-server-id="">
        <summary class="server__summary">
          <span class="server__title" data-role="title">Server</span>
          <span class="pill" data-role="status">…</span>
        </summary>
        <div class="server__body">
        <p class="card__hint" data-role="detail"></p>
        <label class="field">
          <span class="field__label">Name</span>
          <input
            class="field__input"
            type="text"
            data-field="name"
            spellcheck="false"
            placeholder="My server"
          />
        </label>
        <label class="field">
          <span class="field__label">Server URL</span>
          <input
            class="field__input"
            type="text"
            data-field="url"
            spellcheck="false"
            placeholder="https://example.com/mcp"
          />
        </label>
        <label class="field">
          <span class="field__label">Authentication</span>
          <select class="field__input field__select" data-auth="type">
            <option value="none">None</option>
            <option value="header">API key</option>
            <option value="oauth">OAuth (browser)</option>
          </select>
        </label>
        <label class="field" data-auth-field="header-name" hidden>
          <span class="field__label">Header name <span class="field__required">*</span></span>
          <input
            class="field__input"
            type="text"
            data-auth="header-name"
            spellcheck="false"
            required
          />
        </label>
        <div class="field" data-auth-field="secret" hidden>
          <span class="field__label">Header value <span class="field__required">*</span></span>
          <input
            class="field__input"
            type="password"
            data-auth="secret"
            spellcheck="false"
            autocomplete="off"
            required
            placeholder="Paste API key"
          />
          <p class="card__hint" data-role="secret-state"></p>
        </div>
        <div class="field" data-auth-field="oauth" hidden>
          <p class="card__hint" data-role="oauth-state"></p>
          <button type="button" class="button button--ghost auth-signout" data-action="sign-out" hidden>
            Sign out
          </button>
        </div>
        <label class="field field--switch">
          <input type="checkbox" data-field="autoConnect" />
          <span class="field__label">Connect automatically on launch</span>
        </label>
        <div class="card__actions">
          <button type="button" class="button" data-action="connect">Connect</button>
          <button type="button" class="button button--ghost" data-action="disconnect" hidden>Disconnect</button>
          <button type="button" class="button button--danger" data-action="remove">Remove</button>
        </div>
        </div>
      </details>
    </template>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
