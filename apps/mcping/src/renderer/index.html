<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mcping settings</title>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">mcping</h1>
        <p class="app__subtitle">Let MCP servers ping you.</p>
      </header>

      <section class="card">
        <div class="card__row">
          <h2 class="card__title">MCP servers</h2>
          <button id="add-server" type="button" class="button">Add server</button>
        </div>
        <div id="servers" class="servers"></div>
      </section>

      <section class="card">
        <h2 class="card__title">Launch</h2>
        <label class="field field--switch">
          <input type="checkbox" data-setting="launchAtLogin" />
          <span class="field__label">Launch at login</span>
        </label>
      </section>

      <section class="card">
        <div class="card__row">
          <h2 class="card__title">Accessibility</h2>
          <span id="accessibility-pill" class="pill">Checking…</span>
        </div>
        <p class="card__hint">
          Driving Claude Desktop needs the macOS Accessibility permission. After granting it,
          restart mcping.
        </p>
        <div class="card__actions">
          <button id="accessibility-open" type="button" class="button">Open Accessibility settings</button>
          <button id="accessibility-recheck" type="button" class="button button--ghost">Re-check</button>
        </div>
      </section>

      <section class="card">
        <h2 class="card__title">Log</h2>
        <ol id="log" class="log"></ol>
      </section>
    </main>

    <template id="server-template">
      <details class="server" data-server-id="">
        <summary class="server__summary">
          <span class="server__title" data-role="title">Server</span>
          <span class="pill" data-role="status">…</span>
        </summary>
        <div class="server__body">
        <p class="card__hint" data-role="detail"></p>
        <label class="field">
          <span class="field__label">Name</span>
          <input class="field__input" type="text" data-field="name" spellcheck="false" />
        </label>
        <label class="field">
          <span class="field__label">Server URL</span>
          <input class="field__input" type="text" data-field="url" spellcheck="false" />
        </label>
        <label class="field field--switch">
          <input type="checkbox" data-field="autoConnect" />
          <span class="field__label">Connect automatically on launch</span>
        </label>
        <label class="field field--switch">
          <input type="checkbox" data-field="requireApproval" />
          <span class="field__label">Ask for approval before each action (click the notification to run)</span>
        </label>
        <label class="field field--switch">
          <input type="checkbox" data-field="autoSend" />
          <span class="field__label">Send the prompt automatically (otherwise pre-fill only)</span>
        </label>
        <div class="card__actions">
          <button type="button" class="button" data-action="connect">Connect</button>
          <button type="button" class="button button--ghost" data-action="disconnect">Disconnect</button>
          <button type="button" class="button button--ghost" data-action="test">Run test action</button>
          <button type="button" class="button button--danger" data-action="remove">Remove</button>
        </div>
        </div>
      </details>
    </template>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
